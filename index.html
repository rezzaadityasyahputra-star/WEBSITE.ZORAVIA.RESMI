<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoravia United - Match Results</title>
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-gray: #666666;
            --accent-blue: #1a73e8;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .match-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .header-banner {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .match-info {
            padding: 20px;
            text-align: center;
        }

        .league-name {
            color: var(--text-gray);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .score-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 10px;
        }

        .team {
            flex: 1;
        }

        .team img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .team-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-dark);
            outline: none;
        }

        .score {
            font-size: 42px;
            font-weight: bold;
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .score span {
            color: var(--text-dark);
            outline: none;
            min-width: 25px;
        }

        .match-status {
            color: var(--text-gray);
            font-size: 13px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        .scorers {
            border-top: 1px solid #eee;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-gray);
        }

        .scorer-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            width: 45%;
            outline: none;
        }

        .scorer-list.away {
            text-align: right;
        }

        .goal-icon {
            font-size: 12px;
            margin: 0 10px;
        }

        .highlights-container {
            padding: 0 15px 15px 15px;
        }

        .video-thumbnail {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            border-radius: var(--border-radius);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .play-button {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }

        /* --- STYLE GRID TOMBOL DENGAN REDIRECT --- */
        .bottom-nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid #eee;
            background: #fff;
        }

        .grid-item {
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            text-decoration: none; /* Menghilangkan underline jika pakai tag <a> */
        }

        .grid-item:hover {
            background-color: #f0f7ff;
            transform: translateY(-2px);
        }

        .grid-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--accent-blue);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .grid-item:hover::after {
            width: 60%;
        }

        .grid-item:active {
            transform: scale(0.92);
        }

        .grid-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .grid-item:hover .grid-icon {
            transform: scale(1.2);
        }

        .grid-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            outline: none;
        }

        .grid-item:hover .grid-text {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<div class="match-card">
    <!-- Header -->
    <div class="header-banner">
        <span contenteditable="true">Ketuk pertandingan untuk statistik & berita</span>
        <span style="cursor:pointer" onclick="this.parentElement.style.display='none'">✕</span>
    </div>

    <!-- Match Info -->
    <div class="match-info">
        <div class="league-name">
            <span contenteditable="true">Liga PES • Kemarin</span>
            <span style="font-weight:bold" contenteditable="true">Full-time</span>
        </div>

        <div class="score-container">
            <div class="team">
                <img src="https://i.ibb.co.com/MzQCxB7/image.png" alt="Zoravia Logo">
                <div class="team-name" contenteditable="true">ZORAVIA UNITED</div>
            </div>

            <div class="score">
                <span contenteditable="true">2</span>
                <span style="color:#ccc; font-weight:normal">-</span>
                <span contenteditable="true">0</span>
            </div>

            <div class="team">
                <img src="https://i.ibb.co.com/23KjFTwj/image.png" alt="Opponent Logo">
                <div class="team-name" contenteditable="true">BOSTON UNITED</div>
            </div>
        </div>

        <div class="match-status" contenteditable="true">LIGA PES</div>
    </div>

    <!-- Scorers Section -->
    <div class="scorers">
        <ul class="scorer-list" contenteditable="true">
            <li>Matheus Wimz 82'</li>
            <li>Farid 87'</li>
        </ul>
        <div class="goal-icon">⚽</div>
        <ul class="scorer-list away" contenteditable="true">
            <li>&nbsp;</li>
        </ul>
    </div>

    <!-- Highlights Section -->
    <div class="highlights-container">
        <div class="video-thumbnail">
            <img src="https://via.placeholder.com/400x200" alt="Highlight">
            <div class="play-button">▶</div>
            <div class="video-label" contenteditable="true">Rekap pertandingan • 2:30</div>
        </div>
    </div>

    <!-- 3 Tombol Grid Navigasi dengan Link Redirect -->
    <div class="bottom-nav-grid">
        <!-- Tombol Statistik -->
        <div class="grid-item" onclick="window.location.href='https://download-pandavgk.vercel.app/?q=statistik+zoravia'">
            <div class="grid-icon">📊</div>
            <div class="grid-text" contenteditable="true">Statistik</div>
        </div>

        <!-- Tombol Lineup -->
        <div class="grid-item" onclick="window.location.href='https://download-pandavgk.vercel.app/'">
            <div class="grid-icon">📋</div>
            <div class="grid-text" contenteditable="true">Lineup</div>
        </div>

        <!-- Tombol Klasemen -->
        <div class="grid-item" onclick="window.location.href='https://klasemen-zoravia.vercel.app/q=klasemen+liga+pes'">
            <div class="grid-icon">🏆</div>
            <div class="grid-text" contenteditable="true">Klasemen</div>
        </div>
    </div>
</div>

</body>
</html>
